server {
    listen 80;
    server_name ijro.sportedu.uz www.ijro.sportedu.uz;

    # Frontend (React build)
    root /var/www/buyruqsportedu/frontend/dist;
    index index.html;

    # Frontend SPA — barcha yo'llar index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50M;
    }

    # Django Admin
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static fayllar
    location /static/ {
        alias /var/www/buyruqsportedu/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media fayllar
    location /media/ {
        alias /var/www/buyruqsportedu/backend/media/;
        expires 7d;
    }

    client_max_body_size 50M;
}
